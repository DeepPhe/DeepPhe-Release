name: Create Distribution Zip
on:
  workflow_dispatch:

env:
  DIST_REPO: DeepPhe/DeepPhe-Dist
  PACKAGE_NAME: dphe-nlp
  DPHE_VERSION: 7.1

jobs:
  checkout-repos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Release Branch
        uses: actions/checkout@v7
        with:
          ref: auto-copy
          path: copies

      - uses: actions/setup-java@v2
        with:
          java-version: '8'
          distribution: 'adopt'

      - name: Build with Maven
        run: |
          cd copies
          cd dphe-neo4j
          mvn --batch-mode clean install -U -DskipTests
          cd ..
          cd dphe-onto-db2
          mvn --batch-mode clean install -U -DskipTests
          cd ..
          cd dphe-nlp2
          mvn --batch-mode clean package -U -DskipTests
          cp target/deepphe-nlp.jar target/deepphe-0.7.1-bin/deepphe-0.7.1/lib/
          cd ..
          cd dphe-gui
          mvn --batch-mode clean package -U -DskipTests
          cp target/deepphe-desktop.jar target/deepphe-0.7.1-bin/deepphe-0.7.1/lib/
          cd ..          
          cp -frn dphe-gui/target/deepphe-0.7.1-bin/deepphe-0.7.1/ dphe-nlp2/target/deepphe-0.7.1-bin/deepphe-0.7.1
          mkdir zips

      - name: Create zips
        uses: vimtor/action-zip@v1.3
        with:
          files: copies/dphe-nlp2/target/deepphe-0.7.1-bin/deepphe-0.7.1/
          dest: zips/DeepPhe-NLP.zip
          recursive: true

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          {
            echo "title=${PACKAGE_NAME} ${DPHE_VERSION}"
            echo "notes<<EOF"
            echo "Release version ${DPHE_VERSION} of the DeepPhe Translational (xn) software NLP binary."
            echo
            echo "Built from: ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update DeepPhe-Dist release
        env:
          GH_TOKEN: ${{ secrets.DEEPHE_DIST_RELEASE_TOKEN_SPF }}
          RELEASE_TAG: ${{ env.PACKAGE_NAME }}-${{ env.DPHE_VERSION }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          RELEASE_NOTES: ${{ steps.release.outputs.notes }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error title=Missing release token::Add a DEEPHE_DIST_RELEASE_TOKEN secret with contents:write access to ${DIST_REPO}."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$DIST_REPO" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --repo "$DIST_REPO" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" --repo "$DIST_REPO" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES"
          fi

      # The NLP tools are all Java and do not have platform-dependencies.
      # We shouldn't need to create multiple (sub)installers with certification, etc.
      - name: Upload Release Asset
        uses: svenstaro/upload-release-action@v2
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repo_name: 'DeepPhe/DeepPhe-Dist'
#          repo_token: ${{ secrets.GITHUB_TOKEN }}
          repo_token: ${{ secrets.DEEPHE_DIST_RELEASE_TOKEN_SPF }}
          file: zips/DeepPhe-NLP.zip
          asset_name: DeepPhe-NLP.zip
          tag:  ${{ env.PACKAGE_NAME }}-${{ env.DPHE_VERSION }}
          overwrite: true
          prerelease: true
          body: ${{ steps.release.outputs.notes }}
